<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SnipeDAT Options</title>
  <style>
    body {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      margin: 48px auto;
      max-width: 520px;
      padding: 0 20px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-top: 16px;
    }

    input {
      box-sizing: border-box;
      margin-top: 6px;
      padding: 8px;
      width: 100%;
    }

    button {
      cursor: pointer;
      margin-top: 18px;
      padding: 10px 16px;
    }

    #status {
      display: none;
      margin-top: 18px;
      padding: 10px;
    }

    #status.success {
      background: #d4edda;
      color: #155724;
    }

    #status.error {
      background: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <h1>SnipeDAT Settings</h1>
  <form id="options-form">
    <label for="token">Telegram Bot Token</label>
    <input type="password" id="token" name="token" autocomplete="off">

    <label for="chat_id">Telegram Chat ID</label>
    <input type="text" id="chat_id" name="chat_id" autocomplete="off">

    <button type="submit">Save</button>
    <button type="button" id="reset">Reset</button>
  </form>
  <div id="status" role="status"></div>
  <script src="options.js"></script>
</body>
</html>
